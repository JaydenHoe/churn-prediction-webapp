<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Prediction</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
        textarea { width: 100%; max-width: 860px; height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        button { margin-top: 12px; padding: 10px 14px; cursor: pointer; }
        pre { background: #111827; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow: auto; max-width: 860px; }
        .hint { color: #4b5563; max-width: 860px; }
    </style>
</head>
<body>
    <h1>Churn Prediction</h1>
    <p class="hint">Fill in the customer details and click Predict. The app will only show if the customer will churn or not.</p>

    <h3>Quick test form (7 features)</h3>
    <div style="max-width: 860px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <label>
        Contract type
        <select id="contract_type" style="width:100%; padding:8px;">
          <option>Month-to-Month</option>
          <option>One Year</option>
          <option>Two Year</option>
        </select>
      </label>
      <label>
        Internet type
        <select id="internet_type" style="width:100%; padding:8px;">
          <option>Cable</option>
          <option>DSL</option>
          <option selected>Fiber Optic</option>
          <option>None</option>
        </select>
      </label>
      <label>
        Age
        <input id="age" type="number" value="42" style="width:100%; padding:8px;" />
      </label>
      <label>
        Tenure months
        <input id="tenure_months" type="number" value="3" style="width:100%; padding:8px;" />
      </label>
      <label>
        Num referrals
        <input id="num_referrals" type="number" value="0" style="width:100%; padding:8px;" />
      </label>
      <label>
        Num dependents
        <input id="num_dependents" type="number" value="0" style="width:100%; padding:8px;" />
      </label>
      <label style="grid-column: 1 / span 2;">
        Total monthly fee
        <input id="total_monthly_fee" type="number" step="0.01" value="85.5" style="width:100%; padding:8px;" />
      </label>
    </div>

    <button id="predictBtn" type="button">Predict</button>

    <h3>Result</h3>
    <p id="result" class="hint"></p>

    <script>
      const btn = document.getElementById('predictBtn');
      const resultEl = document.getElementById('result');

      function buildPayloadFromForm() {
        return {
          contract_type: document.getElementById('contract_type').value,
          num_referrals: Number(document.getElementById('num_referrals').value),
          num_dependents: Number(document.getElementById('num_dependents').value),
          total_monthly_fee: Number(document.getElementById('total_monthly_fee').value),
          tenure_months: Number(document.getElementById('tenure_months').value),
          internet_type: document.getElementById('internet_type').value,
          age: Number(document.getElementById('age').value),
        };
      }

      btn.addEventListener('click', async () => {
        resultEl.textContent = 'Predicting...';
        const payload = buildPayloadFromForm();

        try {
          const res = await fetch('/api/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => ({}));
          if (!data.success) {
            resultEl.textContent = data.error || 'Prediction failed';
            return;
          }

          const prob = data.churn_probability ?? data.probability;
           const willChurn = data.will_churn;

          if (willChurn === true && typeof prob === 'number') {
            resultEl.textContent = 'Customer WILL churn (probability ' + (prob * 100).toFixed(1) + '%)';
          } else if (willChurn === false && typeof prob === 'number') {
            resultEl.textContent = 'Customer will NOT churn (probability ' + (prob * 100).toFixed(1) + '%)';
          } else if (typeof prob === 'number') {
            // Fallback if will_churn not present
            const thresholdPct = 27; // 0.27 * 100
            const will = prob >= 0.27;
            resultEl.textContent =
              'Customer ' + (will ? 'WILL' : 'will NOT') +
              ' churn (probability ' + (prob * 100).toFixed(1) +
              '%, threshold ' + thresholdPct + '%)';
          } else {
            resultEl.textContent = 'Prediction complete.';
          }
        } catch (e) {
          resultEl.textContent = 'Request failed: ' + e.message;
        }
      });
    </script>
</body>
</html>
